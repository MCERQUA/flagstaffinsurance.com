<!--
  Static form definitions for Netlify build-time form detection (SPA pattern).
  Served at /__forms.html. The real forms live inside Next.js React client
  components which Netlify's crawler cannot parse, so these plain-HTML stubs
  register the forms (+ their named fields) at build time. Domain-agnostic:
  the form names stay "quote"/"contact" across every site in the fleet, so this
  file travels unchanged with the scaffold rsync.
-->
<form name="quote" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="quote" />
  <p hidden><label>Don't fill this out: <input name="bot-field" /></label></p>
  <input name="name" />
  <input name="email" />
  <input name="phone" />
  <input name="company" />
  <input name="operationType" />
  <input name="annualRevenue" />
  <input name="crewSize" />
  <input name="coverageNeeded" />
  <input name="state" />
  <textarea name="message"></textarea>
</form>

<form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="contact" />
  <p hidden><label>Don't fill this out: <input name="bot-field" /></label></p>
  <input name="name" />
  <input name="email" />
  <input name="phone" />
  <textarea name="message"></textarea>
</form>
